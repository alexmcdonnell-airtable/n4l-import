openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Schools
    description: School roster managed by internal staff.
  - name: Staff
    description: Internal staff user management.
  - name: SchoolPortal
    description: Public, token-gated school portal endpoints.
  - name: Products
    description: Product catalog.
  - name: MenuTemplates
    description: Reusable named menu templates with default quantities.
  - name: SchoolDefaults
    description: Per-school default menu management.
  - name: AppSettings
    description: Global application settings, including the order window.
  - name: WeeklyOrders
    description: Weekly order management for staff.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect after login.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /schools:
    get:
      tags: [Schools]
      operationId: listSchools
      summary: List all schools
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: List of schools.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/School'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Schools]
      operationId: createSchool
      summary: Create a new school (returns one-time access token)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchoolBody'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolWithToken'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /schools/{id}:
    get:
      tags: [Schools]
      operationId: getSchool
      summary: Get a school by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: School.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/School'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Schools]
      operationId: updateSchool
      summary: Update a school's details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSchoolBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/School'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Schools]
      operationId: deleteSchool
      summary: Delete a school
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '204':
          description: Deleted.
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /schools/{id}/reset-token:
    post:
      tags: [Schools]
      operationId: resetSchoolToken
      summary: Generate a new access token for the school (invalidates old)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: New token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolWithToken'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /schools/{id}/default-menu:
    get:
      tags: [SchoolDefaults]
      operationId: getSchoolDefaultMenu
      summary: List the school's default menu items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Default menu items for the school.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SchoolDefaultMenuItem'
    post:
      tags: [SchoolDefaults]
      operationId: addSchoolDefaultMenuItem
      summary: Add a single product to the school's default menu
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertMenuItemBody'
      responses:
        '200':
          description: Item added or updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolDefaultMenuItem'
  /schools/{id}/default-menu/stamp:
    post:
      tags: [SchoolDefaults]
      operationId: stampTemplateOntoSchool
      summary: Replace the school's default menu by stamping a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StampTemplateBody'
      responses:
        '200':
          description: Default menu replaced with template items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SchoolDefaultMenuItem'
  /schools/{id}/default-menu/{itemId}:
    patch:
      tags: [SchoolDefaults]
      operationId: updateSchoolDefaultMenuItem
      summary: Update a default menu item's quantity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMenuItemQuantityBody'
      responses:
        '200':
          description: Item updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolDefaultMenuItem'
    delete:
      tags: [SchoolDefaults]
      operationId: removeSchoolDefaultMenuItem
      summary: Remove an item from the school's default menu
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '204':
          description: Removed.
  /staff:
    get:
      tags: [Staff]
      operationId: listStaff
      summary: List all staff users (including invited-only allowlist entries)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: List of staff.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffMember'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Staff]
      operationId: inviteStaff
      summary: Add a staff member to the allowlist (admin only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteStaffBody'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMember'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /staff/{id}:
    patch:
      tags: [Staff]
      operationId: updateStaff
      summary: Update a staff member's role or active status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStaffBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMember'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Staff]
      operationId: removeStaff
      summary: Remove a staff member from the allowlist and system (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '204':
          description: Removed.
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /products:
    get:
      tags: [Products]
      operationId: listProducts
      summary: List all products (staff-readable)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: List of products.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      tags: [Products]
      operationId: createProduct
      summary: Create a new product (admin only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductBody'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  /products/{id}:
    patch:
      tags: [Products]
      operationId: updateProduct
      summary: Update a product (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Products]
      operationId: deleteProduct
      summary: Delete a product (admin only). Fails if the product is in use.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '204':
          description: Deleted.
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Product is in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /menu-templates:
    get:
      tags: [MenuTemplates]
      operationId: listMenuTemplates
      summary: List all menu templates with their items
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: List of templates.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuTemplate'
    post:
      tags: [MenuTemplates]
      operationId: createMenuTemplate
      summary: Create a new menu template (admin only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuTemplateBody'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuTemplate'
  /menu-templates/{id}:
    get:
      tags: [MenuTemplates]
      operationId: getMenuTemplate
      summary: Get a menu template with its items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Template.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuTemplate'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [MenuTemplates]
      operationId: updateMenuTemplate
      summary: Update a menu template's name/description (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMenuTemplateBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuTemplate'
    delete:
      tags: [MenuTemplates]
      operationId: deleteMenuTemplate
      summary: Delete a menu template (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '204':
          description: Deleted.
  /menu-templates/{id}/items:
    post:
      tags: [MenuTemplates]
      operationId: addMenuTemplateItem
      summary: Add or update an item on the template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertMenuItemBody'
      responses:
        '200':
          description: Item upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuTemplateItem'
  /menu-templates/{id}/items/{itemId}:
    patch:
      tags: [MenuTemplates]
      operationId: updateMenuTemplateItem
      summary: Update an item's quantity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMenuItemQuantityBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuTemplateItem'
    delete:
      tags: [MenuTemplates]
      operationId: removeMenuTemplateItem
      summary: Remove an item from a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '204':
          description: Removed.
  /app-settings:
    get:
      tags: [AppSettings]
      operationId: getAppSettings
      summary: Get global application settings
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Application settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettings'
    patch:
      tags: [AppSettings]
      operationId: updateAppSettings
      summary: Update global application settings (admin only)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppSettingsBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSettings'
  /weekly-orders:
    get:
      tags: [WeeklyOrders]
      operationId: listWeeklyOrders
      summary: List every school's order for a given week
      parameters:
        - name: weekStart
          in: query
          required: true
          description: Monday date of the target week (YYYY-MM-DD).
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: One row per school for the chosen week.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeeklyOrderSummary'
  /weekly-orders/{id}:
    get:
      tags: [WeeklyOrders]
      operationId: getWeeklyOrder
      summary: Get an existing weekly order with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Weekly order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyOrder'
    patch:
      tags: [WeeklyOrders]
      operationId: updateWeeklyOrder
      summary: Update a weekly order's status or notes (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWeeklyOrderBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyOrder'
  /weekly-orders/open-or-create:
    post:
      tags: [WeeklyOrders]
      operationId: openOrCreateWeeklyOrder
      summary: Open or create the weekly order row for a school for a given week
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenWeeklyOrderBody'
      responses:
        '200':
          description: Weekly order, possibly newly created from defaults.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyOrder'
  /weekly-orders/{id}/items:
    post:
      tags: [WeeklyOrders]
      operationId: addWeeklyOrderItem
      summary: Add or update an item on a weekly order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertWeeklyOrderItemBody'
      responses:
        '200':
          description: Item upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyOrderItem'
  /weekly-orders/{id}/items/{itemId}:
    patch:
      tags: [WeeklyOrders]
      operationId: updateWeeklyOrderItem
      summary: Update a weekly order item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWeeklyOrderItemBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyOrderItem'
    delete:
      tags: [WeeklyOrders]
      operationId: removeWeeklyOrderItem
      summary: Remove an item from a weekly order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '204':
          description: Removed.
  /school-portal/{token}:
    get:
      tags: [SchoolPortal]
      operationId: getSchoolByToken
      summary: Public — fetch a school's read-only profile by access token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: School profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolProfile'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /school-portal/{token}/order:
    get:
      tags: [SchoolPortal]
      operationId: getSchoolPortalOrder
      summary: Public — fetch this week's order for the school (creates from defaults when window is open)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Coordinator order view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorOrderView'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /school-portal/{token}/order/items:
    post:
      tags: [SchoolPortal]
      operationId: addPortalOrderItem
      summary: Add or update an item on this week's order (window must be open)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertWeeklyOrderItemBody'
      responses:
        '200':
          description: Item upserted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyOrderItem'
        '403':
          description: Order window is closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /school-portal/{token}/order/items/{itemId}:
    patch:
      tags: [SchoolPortal]
      operationId: updatePortalOrderItem
      summary: Update an item on this week's order. Notes are always editable; quantity edits require an open window.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWeeklyOrderItemBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyOrderItem'
        '403':
          description: Order window is closed and quantity change attempted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [SchoolPortal]
      operationId: removePortalOrderItem
      summary: Remove an item (window must be open)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Removed.
        '403':
          description: Order window is closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /school-portal/{token}/order/notes:
    patch:
      tags: [SchoolPortal]
      operationId: updatePortalOrderNotes
      summary: Update the order's notes (always allowed)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePortalOrderNotesBody'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorOrderView'
  /school-portal/{token}/order/confirm:
    post:
      tags: [SchoolPortal]
      operationId: confirmPortalOrder
      summary: Coordinator confirms this week's order (window must be open)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatorOrderView'
        '403':
          description: Order window is closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user, role, active]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
        role:
          type: [string, 'null']
          enum: [admin, staff, null]
        active:
          type: boolean
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code: { type: string, minLength: 1 }
        code_verifier: { type: string, minLength: 1 }
        redirect_uri: { type: string, minLength: 1, format: uri }
        state: { type: string, minLength: 1 }
        nonce: { type: string, minLength: 1 }
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token: { type: string }
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { type: string }
    School:
      type: object
      required:
        - id
        - name
        - contactName
        - contactEmail
        - address
        - notes
        - accessUrl
        - tokenLastResetAt
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        name: { type: string }
        contactName: { type: [string, 'null'] }
        contactEmail: { type: [string, 'null'], format: email }
        address: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
        accessUrl:
          type: string
          description: Full shareable URL for the school portal (available to authenticated staff; built from the stored plain-text access token).
        tokenLastResetAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SchoolWithToken:
      allOf:
        - $ref: '#/components/schemas/School'
        - type: object
          required: [accessToken]
          properties:
            accessToken:
              type: string
              description: Plain-text access token. Returned only on create or reset.
    SchoolProfile:
      type: object
      required:
        - id
        - name
        - contactName
        - contactEmail
        - address
        - notes
      properties:
        id: { type: string }
        name: { type: string }
        contactName: { type: [string, 'null'] }
        contactEmail: { type: [string, 'null'], format: email }
        address: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
    CreateSchoolBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        contactName: { type: [string, 'null'] }
        contactEmail: { type: [string, 'null'], format: email }
        address: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
    UpdateSchoolBody:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        contactName: { type: [string, 'null'] }
        contactEmail: { type: [string, 'null'], format: email }
        address: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
    StaffMember:
      type: object
      required:
        - id
        - email
        - firstName
        - lastName
        - profileImageUrl
        - role
        - active
        - status
        - lastLoginAt
        - createdAt
      properties:
        id: { type: string }
        email: { type: [string, 'null'], format: email }
        firstName: { type: [string, 'null'] }
        lastName: { type: [string, 'null'] }
        profileImageUrl: { type: [string, 'null'] }
        role:
          type: string
          enum: [admin, staff]
        active: { type: boolean }
        status:
          type: string
          enum: [invited, active, inactive]
        lastLoginAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    UpdateStaffBody:
      type: object
      properties:
        role:
          type: string
          enum: [admin, staff]
        active: { type: boolean }
    InviteStaffBody:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        role:
          type: string
          enum: [admin, staff]
    Product:
      type: object
      required:
        - id
        - name
        - description
        - category
        - unit
        - sku
        - allergens
        - active
        - minInventory
        - maxInventory
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: [string, 'null'] }
        category: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        sku: { type: [string, 'null'] }
        allergens: { type: [string, 'null'] }
        active: { type: boolean }
        minInventory: { type: [integer, 'null'], minimum: 0 }
        maxInventory: { type: [integer, 'null'], minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateProductBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        category: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        sku: { type: [string, 'null'] }
        allergens: { type: [string, 'null'] }
        active: { type: boolean }
        minInventory: { type: [integer, 'null'], minimum: 0 }
        maxInventory: { type: [integer, 'null'], minimum: 0 }
    UpdateProductBody:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
        category: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        sku: { type: [string, 'null'] }
        allergens: { type: [string, 'null'] }
        active: { type: boolean }
        minInventory: { type: [integer, 'null'], minimum: 0 }
        maxInventory: { type: [integer, 'null'], minimum: 0 }
    MenuTemplateItem:
      type: object
      required: [id, templateId, productId, quantity, product]
      properties:
        id: { type: string }
        templateId: { type: string }
        productId: { type: string }
        quantity: { type: integer, minimum: 0 }
        product:
          $ref: '#/components/schemas/Product'
    MenuTemplate:
      type: object
      required:
        - id
        - name
        - description
        - items
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: [string, 'null'] }
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuTemplateItem'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateMenuTemplateBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
    UpdateMenuTemplateBody:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: [string, 'null'] }
    UpsertMenuItemBody:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string, minLength: 1 }
        quantity: { type: integer, minimum: 0 }
    UpdateMenuItemQuantityBody:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer, minimum: 0 }
    SchoolDefaultMenuItem:
      type: object
      required: [id, schoolId, productId, quantity, product]
      properties:
        id: { type: string }
        schoolId: { type: string }
        productId: { type: string }
        quantity: { type: integer, minimum: 0 }
        product:
          $ref: '#/components/schemas/Product'
    StampTemplateBody:
      type: object
      required: [templateId]
      properties:
        templateId: { type: string, minLength: 1 }
    AppSettings:
      type: object
      required: [orderWindowOpen, updatedAt]
      properties:
        orderWindowOpen: { type: boolean }
        updatedAt: { type: string, format: date-time }
    UpdateAppSettingsBody:
      type: object
      properties:
        orderWindowOpen: { type: boolean }
    WeeklyOrderItem:
      type: object
      required: [id, orderId, productId, quantity, note, product]
      properties:
        id: { type: string }
        orderId: { type: string }
        productId: { type: string }
        quantity: { type: integer, minimum: 0 }
        note: { type: [string, 'null'] }
        product:
          $ref: '#/components/schemas/Product'
    WeeklyOrder:
      type: object
      required:
        - id
        - schoolId
        - schoolName
        - weekStart
        - status
        - notes
        - confirmedAt
        - items
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        schoolId: { type: string }
        schoolName: { type: string }
        weekStart: { type: string }
        status:
          type: string
          enum: [not_started, in_progress, confirmed]
        notes: { type: [string, 'null'] }
        confirmedAt: { type: [string, 'null'], format: date-time }
        items:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyOrderItem'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    WeeklyOrderSummary:
      type: object
      required:
        - schoolId
        - schoolName
        - weekStart
        - status
        - itemCount
        - notesPreview
      properties:
        orderId: { type: [string, 'null'] }
        schoolId: { type: string }
        schoolName: { type: string }
        weekStart: { type: string }
        status:
          type: string
          enum: [not_started, in_progress, confirmed]
        itemCount: { type: integer, minimum: 0 }
        notesPreview: { type: [string, 'null'] }
        confirmedAt: { type: [string, 'null'], format: date-time }
    UpdateWeeklyOrderBody:
      type: object
      properties:
        notes: { type: [string, 'null'] }
        status:
          type: string
          enum: [not_started, in_progress, confirmed]
    OpenWeeklyOrderBody:
      type: object
      required: [schoolId, weekStart]
      properties:
        schoolId: { type: string, minLength: 1 }
        weekStart: { type: string, minLength: 1 }
    UpsertWeeklyOrderItemBody:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string, minLength: 1 }
        quantity: { type: integer, minimum: 0 }
        note: { type: [string, 'null'] }
    UpdateWeeklyOrderItemBody:
      type: object
      properties:
        quantity: { type: integer, minimum: 0 }
        note: { type: [string, 'null'] }
    UpdatePortalOrderNotesBody:
      type: object
      required: [notes]
      properties:
        notes: { type: [string, 'null'] }
    CoordinatorOrderView:
      type: object
      required:
        - school
        - orderWindowOpen
        - weekStart
        - order
      properties:
        school:
          $ref: '#/components/schemas/SchoolProfile'
        orderWindowOpen: { type: boolean }
        weekStart: { type: string }
        order:
          oneOf:
            - $ref: '#/components/schemas/WeeklyOrder'
            - type: 'null'
